name: Daily digest

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore historical issue pages
        uses: actions/cache/restore@v4
        with:
          path: site/issues
          key: calmtechrss-issues-${{ github.run_id }}
          restore-keys: |
            calmtechrss-issues-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt "sentence-transformers>=2.7.0"
      - name: Generate digest
        env:
          CUDA_VISIBLE_DEVICES: ""
          OMP_NUM_THREADS: "4"
          TOKENIZERS_PARALLELISM: "false"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          BASE_URL="${SITE_BASE_URL:-https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}}"
          python -m calmtechrss run --api-config config/api.example.yml --site-base-url "$BASE_URL"
      - name: Save historical issue pages
        uses: actions/cache/save@v4
        with:
          path: site/issues
          key: calmtechrss-issues-${{ github.run_id }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
