# OpenAI-compatible Chat Completions 配置。
# 复制为 config/api.yml 后使用。建议把密钥放在环境变量里，不要直接写进仓库文件。
llm:
  enabled: true
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  api_key: ""
  model: gpt-4.1-mini
  temperature: 0.2
  timeout_seconds: 180

# GitHub Actions 默认没有 GPU，明确使用 CPU。
# 未安装 sentence-transformers 或模型不可用时，程序会自动回退到本地哈希向量。
embedding:
  model: intfloat/multilingual-e5-small
  device: cpu
  batch_size: 32
  cpu_threads: 4

# 批处理并发设置。
pipeline:
  max_workers: 4
